<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0710" />
  <title>The Hatchling World — Cluckbot + the Realm</title>
  <meta name="description" content="Cluckbot the robot chicken lives in your barnyard. As you care for her, she lays eggs that travel to the Hatchling Realm — where they grow up before joining her back home." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: #0a0710;
      color: #f7f3ff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    /* The two app frames stack; only the active one is visible. */
    #frame-main, #frame-realm {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #0a0710;
      transition: opacity .35s ease;
    }
    #frame-realm { opacity: 0; pointer-events: none; }
    body.show-realm #frame-realm { opacity: 1; pointer-events: auto; }
    body.show-realm #frame-main  { opacity: 0; pointer-events: none; }

    /* Top-right view toggle floats above the iframes. */
    .view-switch {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: 14px;
      z-index: 9999;
      display: inline-flex;
      padding: 3px;
      background: rgba(20,12,32,.78);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: 0 6px 24px -8px rgba(0,0,0,.65);
    }
    .view-switch button {
      padding: 8px 14px;
      border: 0;
      background: transparent;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .22em;
      color: #cfc3e8;
      cursor: pointer;
      transition: background .2s ease, color .2s ease, box-shadow .2s ease;
    }
    .view-switch button.active {
      background: linear-gradient(135deg, rgba(255,127,214,.35), rgba(255,213,127,.25));
      color: #fff;
      box-shadow: 0 0 14px rgba(255,127,214,.35), 0 0 0 1px rgba(255,255,255,.12) inset;
    }
    .view-switch button:hover:not(.active) {
      background: rgba(255,255,255,.06);
      color: #fff;
    }

    /* Egg notification — pops when V1 lays an egg and the realm receives it. */
    #egg-notice {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-30px);
      z-index: 9998;
      padding: 10px 18px;
      background: rgba(20,12,32,.85);
      border: 1px solid rgba(255,213,127,.45);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: #ffd57f;
      opacity: 0;
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
      pointer-events: none;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    #egg-notice.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #egg-notice button {
      margin-left: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(255,213,127,.55);
      background: rgba(255,213,127,.12);
      color: #ffd57f;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      pointer-events: auto;
    }
    #egg-notice button:hover { background: rgba(255,213,127,.25); }

    /* Graduate notice — pops when a hatchling matures and joins the flock. */
    #grad-notice {
      position: fixed;
      top: max(58px, calc(env(safe-area-inset-top) + 50px));
      left: 50%;
      transform: translateX(-50%) translateY(-30px);
      z-index: 9997;
      padding: 10px 18px;
      background: rgba(20,12,32,.85);
      border: 1px solid rgba(141, 243, 108, .55);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: #b8f5a0;
      opacity: 0;
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
      pointer-events: none;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    #grad-notice.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Flock strip — graduated hatchling portraits at the bottom of the
       barnyard view. Hidden when REALM is active so it doesn't compete with
       the 3D world chrome. */
    #flock-strip {
      position: fixed;
      left: 50%;
      bottom: max(96px, calc(env(safe-area-inset-bottom) + 96px));
      transform: translateX(-50%);
      z-index: 8;
      display: flex;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(20,12,32,.55);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: 0 6px 24px -8px rgba(0,0,0,.55);
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s ease;
    }
    #flock-strip.show { opacity: 1; }
    body.show-realm #flock-strip { display: none; }
    .flock-member {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(141, 243, 108, .55);
      background: rgba(141, 243, 108, .08);
      box-shadow: 0 0 12px rgba(141, 243, 108, .35);
      transition: transform .2s ease;
    }
    .flock-member.fresh {
      animation: flockArrive .9s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes flockArrive {
      0%   { transform: scale(0) translateY(20px); opacity: 0; }
      60%  { transform: scale(1.15) translateY(0); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Main view (V1 Cluckbot) and the 3D Realm both live in iframes so their
       JS state stays cleanly partitioned. Bond/egg state flows between them
       via localStorage and a setInterval watcher in router.js below. -->
  <iframe id="frame-main"  src="./main/index.html"  title="Cluckbot — main view"></iframe>
  <iframe id="frame-realm" src="./realm.html"       title="Hatchling Realm"></iframe>

  <!-- Top-right toggle: BARNYARD (V1 Cluckbot) ↔ REALM (3D Hatchling Realm) -->
  <div class="view-switch" role="tablist" aria-label="View">
    <button id="btn-main"  class="active" type="button">BARNYARD</button>
    <button id="btn-realm"               type="button">REALM</button>
  </div>

  <!-- "Blue laid an egg — visit the realm" prompt -->
  <div id="egg-notice" role="status" aria-live="polite">
    <span id="egg-notice-text">Blue laid an egg — it's in the Realm.</span>
    <button id="egg-notice-go">VISIT</button>
  </div>

  <!-- "X has grown up — joining Blue at the barnyard" notice -->
  <div id="grad-notice" role="status" aria-live="polite"></div>

  <!-- Flock strip — graduated hatchling portraits, shown only over the
       barnyard view. Populated by router.js from the graduates ledger. -->
  <div id="flock-strip" aria-label="Returned hatchlings"></div>

  <script src="./router.js"></script>
</body>
</html>
