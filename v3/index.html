<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0710" />
  <title>The Hatchling World — Cluckbot + the Realm</title>
  <meta name="description" content="Cluckbot the robot chicken lives in your barnyard. As you care for her, she lays eggs that travel to the Hatchling Realm — where they grow up before joining her back home." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: #0a0710;
      color: #f7f3ff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    /* The two app frames stack; only the active one is visible. */
    #frame-main, #frame-realm {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #0a0710;
      transition: opacity .35s ease;
    }
    #frame-realm { opacity: 0; pointer-events: none; }
    body.show-realm #frame-realm { opacity: 1; pointer-events: auto; }
    body.show-realm #frame-main  { opacity: 0; pointer-events: none; }

    /* Top-right view toggle floats above the iframes. */
    .view-switch {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: inline-flex;
      padding: 3px;
      background: rgba(20,12,32,.92);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: 0 8px 26px -8px rgba(0,0,0,.75);
    }
    .view-switch button {
      padding: 8px 16px;
      border: 0;
      background: transparent;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .22em;
      color: #cfc3e8;
      cursor: pointer;
      transition: background .2s ease, color .2s ease, box-shadow .2s ease;
    }
    .view-switch button.active {
      background: linear-gradient(135deg, rgba(255,127,214,.35), rgba(255,213,127,.25));
      color: #fff;
      box-shadow: 0 0 14px rgba(255,127,214,.35), 0 0 0 1px rgba(255,255,255,.12) inset;
    }
    .view-switch button:hover:not(.active) {
      background: rgba(255,255,255,.06);
      color: #fff;
    }

    /* Egg notification — pops when V1 lays an egg and the realm receives it.
       Anchored to the bottom-center next to the view-switch so it never
       collides with V1's topbar at the top of the screen. */
    #egg-notice {
      position: fixed;
      bottom: max(70px, calc(env(safe-area-inset-bottom) + 60px));
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      z-index: 9998;
      padding: 10px 18px;
      background: rgba(20,12,32,.85);
      border: 1px solid rgba(255,213,127,.45);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: #ffd57f;
      opacity: 0;
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
      pointer-events: none;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    #egg-notice.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    body.show-realm #egg-notice { display: none; }
    #egg-notice button {
      margin-left: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(255,213,127,.55);
      background: rgba(255,213,127,.12);
      color: #ffd57f;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      pointer-events: auto;
    }
    #egg-notice button:hover { background: rgba(255,213,127,.25); }

    /* Graduate notice — anchored to the bottom-center, above the egg
       notice and view switch, so the V1 topbar at the top stays clear. */
    #grad-notice {
      position: fixed;
      bottom: max(116px, calc(env(safe-area-inset-bottom) + 110px));
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      z-index: 9997;
      padding: 10px 18px;
      background: rgba(20,12,32,.85);
      border: 1px solid rgba(141, 243, 108, .55);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: #b8f5a0;
      opacity: 0;
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
      pointer-events: none;
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
    }
    #grad-notice.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    body.show-realm #grad-notice { display: none; }

    /* Wandering flock — each graduate is a portrait sprite that drifts
       across the barnyard, hops, and pops emoji thought-bubbles. Hidden
       when REALM is active. The container is full-screen but transparent;
       each .flock-member is absolutely positioned and animated by router.js. */
    #flock-layer {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: hidden;
    }
    body.show-realm #flock-layer { display: none; }
    .flock-member {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(141, 243, 108, .6);
      background: rgba(141, 243, 108, .08);
      box-shadow: 0 0 12px rgba(141, 243, 108, .45),
                  0 4px 14px -4px rgba(0,0,0,.6);
      transition: border-color .35s ease, box-shadow .35s ease;
      pointer-events: auto;
      cursor: pointer;
      will-change: transform;
    }
    .flock-member.fresh {
      animation: flockArrive 1.1s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes flockArrive {
      0%   { transform: scale(0) translateY(-30px); opacity: 0; }
      55%  { transform: scale(1.18) translateY(0); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    /* Mood-coded outlines */
    .flock-member.mood-happy   { border-color: rgba(141, 243, 108, .75); box-shadow: 0 0 18px rgba(141,243,108,.6), 0 6px 20px -6px rgba(0,0,0,.6); }
    .flock-member.mood-hungry  { border-color: rgba(255, 184,  74, .75); box-shadow: 0 0 18px rgba(255,184,74,.6),  0 6px 20px -6px rgba(0,0,0,.6); }
    .flock-member.mood-sad     { border-color: rgba(125, 200, 255, .75); box-shadow: 0 0 18px rgba(125,200,255,.6), 0 6px 20px -6px rgba(0,0,0,.6); }
    .flock-member.mood-tired   { border-color: rgba(200, 144, 255, .75); box-shadow: 0 0 18px rgba(200,144,255,.6), 0 6px 20px -6px rgba(0,0,0,.6); }
    .flock-member.mood-playful { border-color: rgba(255, 158, 199, .75); box-shadow: 0 0 18px rgba(255,158,199,.6), 0 6px 20px -6px rgba(0,0,0,.6); }
    /* Thought bubble */
    .flock-emote {
      position: absolute;
      font-size: 24px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
      animation: emoteFloat 1.8s ease-out forwards;
      pointer-events: none;
      z-index: 9;
    }
    @keyframes emoteFloat {
      0%   { opacity: 0; transform: translate(-50%, 0) scale(.7); }
      20%  { opacity: 1; transform: translate(-50%, -10px) scale(1); }
      80%  { opacity: 1; transform: translate(-50%, -40px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -60px) scale(.9); }
    }
  </style>
</head>
<body>

  <!-- Main view (V1 Cluckbot) and the 3D Realm both live in iframes so their
       JS state stays cleanly partitioned. Bond/egg state flows between them
       via localStorage and a setInterval watcher in router.js below. -->
  <iframe id="frame-main"  src="./main/index.html"  title="Cluckbot — main view"></iframe>
  <iframe id="frame-realm" src="./realm.html"       title="Hatchling Realm"></iframe>

  <!-- Top-right toggle: BARNYARD (V1 Cluckbot) ↔ REALM (3D Hatchling Realm) -->
  <div class="view-switch" role="tablist" aria-label="View">
    <button id="btn-main"  class="active" type="button">BARNYARD</button>
    <button id="btn-realm"               type="button">REALM</button>
  </div>

  <!-- "Blue laid an egg — visit the realm" prompt -->
  <div id="egg-notice" role="status" aria-live="polite">
    <span id="egg-notice-text">Blue laid an egg — it's in the Realm.</span>
    <button id="egg-notice-go">VISIT</button>
  </div>

  <!-- "X has grown up — joining Blue at the barnyard" notice -->
  <div id="grad-notice" role="status" aria-live="polite"></div>

  <!-- Wandering flock — each graduate is a portrait sprite that drifts
       across the barnyard, animated by router.js. Hidden in REALM view. -->
  <div id="flock-layer" aria-label="Returned hatchlings"></div>

  <script src="./router.js"></script>
</body>
</html>
